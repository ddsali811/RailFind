services:
  - type: web
    name: railfind-mvp
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
